<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>xv6 server terminal</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="bar">
      <div>
        <h1>xv6 server terminal</h1>
        <p id="status">Disconnected</p>
      </div>
      <nav class="mode-links" aria-label="browser modes">
        <a href="./" aria-current="page">Server QEMU</a>
        <a href="./jslinux.html">JSLinux</a>
      </nav>
      <div class="actions">
        <button id="connect" type="button">Connect</button>
        <button id="interrupt" type="button" disabled>Ctrl-C</button>
        <button id="disconnect" type="button" disabled>Disconnect</button>
      </div>
    </header>

    <pre id="terminal" class="terminal" tabindex="0" aria-label="xv6 terminal output"></pre>

    <form id="input-form" class="input-bar" autocomplete="off">
      <label for="input">input</label>
      <input id="input" type="text" spellcheck="false" disabled>
      <button id="send" type="submit" disabled>Send</button>
    </form>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
