<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
<rect width="100%" height="100%" fill="#f7f7f3"/>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#3567a8"/>
</marker>
</defs>
<text x="72" y="64" font-family="monospace" font-size="34" font-weight="700" fill="#1b1b1b" text-anchor="start">xv6-riscv-test visualization pipeline</text>
<text x="72" y="100" font-family="monospace" font-size="20" font-weight="400" fill="#55524b" text-anchor="start">Guest-side C programs emit structured trace text; host-side Python parses it and renders PNG, SVG, and a live Tkinter window.</text>
<rect x="70" y="150" width="500" height="900" rx="18" fill="#e8f0fb" stroke="#c8c3b8" stroke-width="2"/>
<text x="100" y="190" font-family="monospace" font-size="26" font-weight="700" fill="#1b1b1b" text-anchor="start">1. Guest workload emitters</text>
<text x="100" y="225" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">C programs run inside xv6 and trigger the tracer syscalls.</text>
<rect x="100" y="260" width="430" height="170" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="125" y="295" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Process / memory demo</text>
<text x="125" y="330" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">user/memviz.c</text>
<text x="125" y="362" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">user/vizwork.c</text>
<text x="125" y="395" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">calls vizsnap() every N ticks</text>
<rect x="100" y="455" width="430" height="170" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="125" y="490" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Scheduler demo</text>
<text x="125" y="525" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">user/schedtrace.c</text>
<text x="125" y="557" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">user/schedwork.c</text>
<text x="125" y="590" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">calls schedtrace() + CPU-burn workload</text>
<rect x="100" y="650" width="430" height="170" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="125" y="685" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Lock contention demo</text>
<text x="125" y="720" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">user/locktrace.c</text>
<text x="125" y="752" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">user/lockwork.c</text>
<text x="125" y="785" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">calls locktrace() + lockdemo() workload</text>
<rect x="100" y="845" width="430" height="145" rx="18" fill="#fffaf0" stroke="#c8c3b8" stroke-width="2"/>
<text x="125" y="880" font-family="monospace" font-size="18" font-weight="400" fill="#1b1b1b" text-anchor="start">All demos are launched from the host via</text>
<text x="125" y="910" font-family="monospace" font-size="20" font-weight="700" fill="#1b1b1b" text-anchor="start">make qemu -&gt; xv6 shell prompt</text>
<text x="125" y="944" font-family="monospace" font-size="17" font-weight="400" fill="#55524b" text-anchor="start">The Python tool writes commands into the guest shell.</text>
<rect x="635" y="150" width="520" height="900" rx="18" fill="#ecebe4" stroke="#c8c3b8" stroke-width="2"/>
<text x="665" y="190" font-family="monospace" font-size="26" font-weight="700" fill="#1b1b1b" text-anchor="start">2. xv6 kernel trace producers</text>
<text x="665" y="225" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">Kernel syscalls and trace buffers package data as delimited text.</text>
<rect x="665" y="270" width="460" height="180" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="690" y="305" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Process / memory snapshot path</text>
<text x="690" y="340" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">sys_vizsnap()</text>
<text x="690" y="372" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">prints BEGIN/END VIZSNAP</text>
<text x="690" y="404" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">emits PROC and PAGE records</text>
<rect x="665" y="480" width="460" height="180" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="690" y="515" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Scheduler trace path</text>
<text x="690" y="550" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">sys_schedtrace()</text>
<text x="690" y="582" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">reads ring buffer and prints</text>
<text x="690" y="614" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">BEGIN/END SCHEDTRACE + EVENT lines</text>
<rect x="665" y="690" width="460" height="180" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="690" y="725" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Lock trace path</text>
<text x="690" y="760" font-family="monospace" font-size="20" font-weight="400" fill="#1b1b1b" text-anchor="start">sys_locktrace() / sys_lockdemo()</text>
<text x="690" y="792" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">prints BEGIN/END LOCKTRACE</text>
<text x="690" y="824" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">EVENT lines with try / acq / rel</text>
<rect x="665" y="905" width="460" height="110" rx="18" fill="#f4f0e6" stroke="#c8c3b8" stroke-width="2"/>
<text x="690" y="940" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Output channel</text>
<text x="690" y="972" font-family="monospace" font-size="19" font-weight="400" fill="#1b1b1b" text-anchor="start">kernel printk -&gt; QEMU stdout</text>
<text x="690" y="1002" font-family="monospace" font-size="17" font-weight="400" fill="#55524b" text-anchor="start">Python consumes the text stream.</text>
<rect x="1210" y="150" width="520" height="900" rx="18" fill="#e8f3e8" stroke="#c8c3b8" stroke-width="2"/>
<text x="1240" y="190" font-family="monospace" font-size="26" font-weight="700" fill="#1b1b1b" text-anchor="start">3. Host-side Python renderer</text>
<text x="1240" y="225" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">tools/procviz.py, memviz.py, schedviz.py, lockviz.py</text>
<rect x="1240" y="270" width="460" height="185" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="1265" y="305" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Capture loop</text>
<text x="1265" y="340" font-family="monospace" font-size="18" font-weight="400" fill="#1b1b1b" text-anchor="start">launches make qemu</text>
<text x="1265" y="372" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">wait_for_prompt() then injects shell commands</text>
<text x="1265" y="404" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">reads stdout in a background thread</text>
<rect x="1240" y="485" width="460" height="185" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="1265" y="520" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Parser</text>
<text x="1265" y="555" font-family="monospace" font-size="18" font-weight="400" fill="#1b1b1b" text-anchor="start">splits on BEGIN / END markers</text>
<text x="1265" y="587" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">turns lines into snapshot / event objects</text>
<text x="1265" y="619" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">builds the data needed for charts or tables</text>
<rect x="1240" y="700" width="460" height="185" rx="18" fill="#ffffff" stroke="#c8c3b8" stroke-width="2"/>
<text x="1265" y="735" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Renderer</text>
<text x="1265" y="770" font-family="monospace" font-size="18" font-weight="400" fill="#1b1b1b" text-anchor="start">Pillow draws the PNG</text>
<text x="1265" y="802" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">SVG is written directly as markup</text>
<text x="1265" y="834" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">Tkinter displays the live window if available</text>
<rect x="1240" y="915" width="460" height="95" rx="18" fill="#f4f7f4" stroke="#c8c3b8" stroke-width="2"/>
<text x="1265" y="950" font-family="monospace" font-size="22" font-weight="700" fill="#1b1b1b" text-anchor="start">Outputs</text>
<text x="1265" y="982" font-family="monospace" font-size="19" font-weight="400" fill="#1b1b1b" text-anchor="start">*.svg  *.png  optional live desktop window</text>
<line x1="570" y1="335" x2="635" y2="335" stroke="#3567a8" stroke-width="4" marker-end="url(#arrow)"/>
<text x="603" y="315" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="middle">syscalls / trace records</text>
<line x1="570" y1="540" x2="635" y2="540" stroke="#3567a8" stroke-width="4" marker-end="url(#arrow)"/>
<text x="603" y="520" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="middle">syscalls / trace records</text>
<line x1="570" y1="735" x2="635" y2="735" stroke="#3567a8" stroke-width="4" marker-end="url(#arrow)"/>
<text x="603" y="715" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="middle">syscalls / trace records</text>
<line x1="1155" y1="360" x2="1210" y2="360" stroke="#3567a8" stroke-width="4" marker-end="url(#arrow)"/>
<text x="1183" y="340" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="middle">QEMU stdout</text>
<line x1="1155" y1="570" x2="1210" y2="570" stroke="#3567a8" stroke-width="4" marker-end="url(#arrow)"/>
<text x="1183" y="550" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="middle">QEMU stdout</text>
<line x1="1155" y1="780" x2="1210" y2="780" stroke="#3567a8" stroke-width="4" marker-end="url(#arrow)"/>
<text x="1183" y="760" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="middle">QEMU stdout</text>
<text x="72" y="1090" font-family="monospace" font-size="18" font-weight="400" fill="#55524b" text-anchor="start">Note: the repo uses Pillow and Tkinter, not matplotlib, for the current visualizer implementation.</text>
</svg>